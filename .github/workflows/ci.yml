name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly

    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: just test --verbose

      # This crate has a lib target, so doctests have something to run.
      - name: Run doctests
        run: just doctest

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: just fmt-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      # Gates the build: `just check` runs clippy with `-D warnings`, so any lint
      # fails CI. Default (CPU) features — `--all-features` would pull in `cuda`,
      # which needs a toolkit absent on the hosted runner.
      - name: Run clippy
        run: just check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvmcov-${{ hashFiles('**/Cargo.lock') }}

      # CPU-only: covers the protocol/handler/inference unit tests. The model
      # load + ML decode path is GPU/weights-gated (the `transcribe_e2e` test,
      # which self-skips here), so it is intentionally not counted.
      - name: Coverage (lcov + summary)
        run: just coverage-lcov

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

  # Publish the browsable HTML coverage report to GitHub Pages (main only).
  # One-time setup: repo Settings → Pages → Source = "GitHub Actions".
  # Served at https://<owner>.github.io/super-stt-whisper/.
  coverage-pages:
    name: Coverage (Pages)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    # Serialize deploys; never cancel an in-flight Pages deployment.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvmcov-${{ hashFiles('**/Cargo.lock') }}

      # Same CPU-only scope as the lcov job: renders the static report to
      # target/llvm-cov/html/ (the GPU/weights-gated decode path self-skips).
      - name: Generate HTML coverage report
        run: just coverage --html

      # Drop a shields.io "endpoint" JSON beside the HTML so the README badge
      # reads the latest line-% straight from Pages — no Gist or PAT. `report`
      # reuses the profiles just collected (no rebuild). jq ships on the runner.
      - name: Write coverage badge JSON
        run: |
          set -euo pipefail
          pct=$(cargo llvm-cov report --json --summary-only --ignore-filename-regex 'tests/' \
            | jq -r '.data[0].totals.lines.percent')
          if   awk "BEGIN{exit !($pct>=90)}"; then color=brightgreen
          elif awk "BEGIN{exit !($pct>=75)}"; then color=green
          elif awk "BEGIN{exit !($pct>=60)}"; then color=yellow
          elif awk "BEGIN{exit !($pct>=40)}"; then color=orange
          else color=red
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%.1f%%","color":"%s"}\n' \
            "$pct" "$color" > target/llvm-cov/html/coverage.json
          cat target/llvm-cov/html/coverage.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/llvm-cov/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
