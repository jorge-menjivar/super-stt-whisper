#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# Whisper (local) subprocess backend. See docs/protocol/backend/.

[backend]
    source      = "github.com/jorge-menjivar/super-stt-whisper"
    name        = "Whisper (local)"
    version     = "0.1.0"
    kind        = "subprocess"
    entrypoint  = "super-stt-backend-whisper"
    contract    = "v1"
    license     = "GPL-3.0-only"
    description = "Local Whisper speech-to-text."

[network]
    allowed_hosts = []

[[assets.subprocess]]
    file = "whisper-x86_64-unknown-linux-gnu-cpu.tar.gz"
    target = "x86_64-unknown-linux-gnu"
    accel = "cpu"

[[assets.subprocess]]
    file = "whisper-x86_64-unknown-linux-gnu-cuda12-sm75.tar.gz"
    target = "x86_64-unknown-linux-gnu"
    accel = "cuda"
    cuda_major = 12
    cuda_sm = 75

[[assets.subprocess]]
    file = "whisper-x86_64-unknown-linux-gnu-cuda12-sm80.tar.gz"
    target = "x86_64-unknown-linux-gnu"
