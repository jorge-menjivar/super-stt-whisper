[[models]]
    name                   = "whisper-tiny"
    provider               = "local_whisper"
    multilingual           = true
    primary_language       = "en"
    supported_languages    = ["en","zh","de","es","ru","ko","fr","ja","pt","tr","pl","ca","nl","ar","sv","it","id","hi","fi","vi","he","uk","el","ms","cs","ro","da","hu","ta","no","th","ur","hr","bg","lt","la","mi","ml","cy","sk","te","fa","lv","bn","sr","az","sl","kn","et","mk","br","eu","is","hy","ne","mn","bs","kk","sq","sw","gl","mr","pa","si","km","sn","yo","so","af","oc","ka","be","tg","sd","gu","am","yi","lo","uz","fo","ht","ps","tk","nn","mt","sa","lb","my","bo","tl","mg","as","tt","haw","ln","ha","ba","jw","su","yue"]
    supported_devices      = ["cpu", "cuda"]
    estimated_vram_bytes   = 1073741824
    processing_interval_ms = 1000
    files = [
        { url = "https://huggingface.co/openai/whisper-tiny/resolve/main/config.json", destination = "models/whisper-tiny/config.json" },
        { url = "https://huggingface.co/openai/whisper-tiny/resolve/main/tokenizer.json", destination = "models/whisper-tiny/tokenizer.json" },
        { url = "https://huggingface.co/openai/whisper-tiny/resolve/main/model.safetensors", destination = "models/whisper-tiny/model.safetensors" },
    ]

[[models]]
    name                   = "whisper-tiny.en"
